name: Start Ephemeral Server

# Trigger manually from the GitHub Actions UI (Actions → "Start Ephemeral Server" → Run workflow)
on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: "How long to keep the server alive (minutes, max 60)"
        required: false
        default: "10"

jobs:
  serve:
    name: Run WebSocket server via Cloudflare tunnel
    runs-on: ubuntu-latest
    timeout-minutes: 65
    permissions:
      contents: write  # needed for checkout + writing tunnel URL file   # hard cap — keep above maximum allowed duration_minutes

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Python environment
      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # -----------------------------------------------------------------------
      # 3. Install cloudflared  (official .deb from GitHub Releases)
      # -----------------------------------------------------------------------
      - name: Install cloudflared
        run: |
          set -eux
          # Use /latest/download/ redirect — no API call needed, avoids rate limits
          curl -fsSL \
            "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb" \
            -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb
          cloudflared --version

      # -----------------------------------------------------------------------
      # 3b. Install localtunnel (fallback tunnel solution)
      # -----------------------------------------------------------------------
      - name: Install localtunnel
        run: |
          npm install -g localtunnel

      # -----------------------------------------------------------------------
      # 4. Start uvicorn server in background
      # -----------------------------------------------------------------------
      - name: Start uvicorn server
        env:
          SESSION_DURATION_MINUTES: ${{ github.event.inputs.duration_minutes }}
        run: |
          nohup uvicorn server:app --host 127.0.0.1 --port 8765 \
            > /tmp/uvicorn.log 2>&1 &
          echo "Waiting for uvicorn to be ready …"
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:8765/ > /dev/null 2>&1; then
              echo "uvicorn is up."
              break
            fi
            sleep 1
          done

      # -----------------------------------------------------------------------
      # 5. Start Cloudflare tunnel first, fallback to LocalTunnel if needed
      # -----------------------------------------------------------------------
      - name: Start tunnel (Cloudflare with LocalTunnel fallback)
        run: |
          PUBLIC_URL=""
          TUNNEL_TYPE=""

          # Try Cloudflare first
          echo "Attempting to start Cloudflare tunnel..."
          nohup cloudflared tunnel --url http://127.0.0.1:8765 \
            > /tmp/cf.log 2>&1 &
          CF_PID=$!
          
          for i in $(seq 1 40); do
            sleep 3
            PUBLIC_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' /tmp/cf.log | head -1)
            if [ -n "$PUBLIC_URL" ]; then
              TUNNEL_TYPE="Cloudflare"
              echo "✓ Cloudflare tunnel started successfully"
              break
            fi
          done

          # Fallback to LocalTunnel if Cloudflare failed
          if [ -z "$PUBLIC_URL" ]; then
            echo "⚠ Cloudflare tunnel failed, falling back to LocalTunnel..."
            kill $CF_PID 2>/dev/null || true
            sleep 2
            
            nohup lt --port 8765 --print-requests \
              > /tmp/lt.log 2>&1 &
            LT_PID=$!
            
            for i in $(seq 1 40); do
              sleep 2
              # LocalTunnel output format: https://adjective-noun-random.loca.lt
              PUBLIC_URL=$(grep -oP 'https://[a-zA-Z0-9\-]+\.loca\.lt' /tmp/lt.log | head -1)
              if [ -n "$PUBLIC_URL" ]; then
                TUNNEL_TYPE="LocalTunnel"
                echo "✓ LocalTunnel started successfully"
                break
              fi
            done
          fi

          if [ -z "$PUBLIC_URL" ]; then
            echo "ERROR: both Cloudflare and LocalTunnel failed"
            echo "=== Cloudflare log ==="
            cat /tmp/cf.log || true
            echo ""
            echo "=== LocalTunnel log ==="
            cat /tmp/lt.log || true
            exit 1
          fi

          echo "$PUBLIC_URL" > /tmp/tunnel_url.txt
          echo "$TUNNEL_TYPE" > /tmp/tunnel_type.txt
          echo "::notice title=TunnelURL::$PUBLIC_URL (via $TUNNEL_TYPE)"
          
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          echo "$PUBLIC_URL" > .tunnel-url
          git add .tunnel-url
          git commit -m "chore: update tunnel URL (via $TUNNEL_TYPE)" || echo "No changes to commit"
          git push || echo "git push failed, URL available in logs above"
          echo "Tunnel URL written to repo file .tunnel-url"
          echo ""
          echo "============================================================"
          echo "  TUNNEL TYPE     : $TUNNEL_TYPE"
          echo "  PUBLIC HTTP URL : $PUBLIC_URL"
          echo "  PUBLIC WSS URL  : ${PUBLIC_URL/https:/wss:}/ws"
          echo "  Health-check    : curl $PUBLIC_URL"
          echo "  Client count    : curl $PUBLIC_URL/clients"
          echo "============================================================"
          echo ""


      # -----------------------------------------------------------------------
      # 6. Keep runner alive for the requested number of minutes
      # -----------------------------------------------------------------------
      - name: Keep server alive
        run: |
          DURATION="${{ github.event.inputs.duration_minutes }}"
          # Clamp to [1, 60]
          DURATION=$(( DURATION < 1 ? 1 : (DURATION > 60 ? 60 : DURATION) ))
          SECONDS_LEFT=$(( DURATION * 60 ))
          echo "Server will stay alive for ${DURATION} minute(s) (${SECONDS_LEFT}s)."
          echo "Send Ctrl-C from the GitHub Actions UI (cancel the job) to stop early."
          sleep "$SECONDS_LEFT"

      # -----------------------------------------------------------------------
      # 7. Show server logs on completion (useful for debugging)
      # -----------------------------------------------------------------------
      - name: Dump server logs
        if: always()
        run: |
          echo "=== uvicorn log ==="
          cat /tmp/uvicorn.log || true
          echo ""
          echo "=== cloudflared log ==="
          cat /tmp/cf.log || true
          echo ""
          echo "=== localtunnel log ==="
          cat /tmp/lt.log || true
