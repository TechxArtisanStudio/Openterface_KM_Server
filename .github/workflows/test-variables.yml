name: Test GitHub Actions Variable Writing

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  job-one:
    runs-on: ubuntu-latest
    outputs:
      output_var: ${{ steps.set_var.outputs.output_var }}
      build_version: ${{ steps.set_var.outputs.build_version }}
      timestamp: ${{ steps.set_var.outputs.timestamp }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Write GitHub Actions variables
        id: set_var
        run: |
          echo "output_var=Hello from Job One" >> $GITHUB_OUTPUT
          echo "build_version=1.0.0" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +%Y-%m-%d\ %H:%M:%S)" >> $GITHUB_OUTPUT
          echo "commit_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
      
      - name: Display variables within job
        run: |
          echo "output_var: ${{ steps.set_var.outputs.output_var }}"
          echo "build_version: ${{ steps.set_var.outputs.build_version }}"
          echo "timestamp: ${{ steps.set_var.outputs.timestamp }}"
          echo "commit_sha: ${{ steps.set_var.outputs.commit_sha }}"
  
  job-two:
    needs: job-one
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Use variables from previous job
        run: |
          echo "Received from job-one:"
          echo "output_var: ${{ needs.job-one.outputs.output_var }}"
          echo "build_version: ${{ needs.job-one.outputs.build_version }}"
          echo "timestamp: ${{ needs.job-one.outputs.timestamp }}"
      
      - name: Write new variables in this job
        id: process_var
        run: |
          echo "processed_data=Data processed successfully" >> $GITHUB_OUTPUT
          echo "status=COMPLETED" >> $GITHUB_OUTPUT
          echo "upstream_version=${{ needs.job-one.outputs.build_version }}" >> $GITHUB_OUTPUT
      
      - name: Display new job variables
        run: |
          echo "processed_data: ${{ steps.process_var.outputs.processed_data }}"
          echo "status: ${{ steps.process_var.outputs.status }}"
          echo "upstream_version: ${{ steps.process_var.outputs.upstream_version }}"
