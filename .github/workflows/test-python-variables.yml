name: Test GitHub Actions Variables with Python

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  test-github-variables:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Write GitHub Action Variables
        id: write_vars
        run: |
          echo "Writing GitHub Actions variables using GITHUB_OUTPUT..."
          echo "action_var_1=Hello from GitHub Actions" >> $GITHUB_OUTPUT
          echo "action_var_2=Build Success" >> $GITHUB_OUTPUT
          echo "action_var_3=$(date +%Y-%m-%d\ %H:%M:%S)" >> $GITHUB_OUTPUT
          echo "Variables written successfully!"
      
      - name: Run GitHub Variables Reader
        env:
          MYGITHUB_TOKEN: ${{ secrets.MYGITHUB_TOKEN }}
          ACTION_VAR_1: ${{ steps.write_vars.outputs.action_var_1 }}
          ACTION_VAR_2: ${{ steps.write_vars.outputs.action_var_2 }}
          ACTION_VAR_3: ${{ steps.write_vars.outputs.action_var_3 }}
        run: |
          echo "Running GitHub Actions variable reader..."
          echo "Variables passed to Python:"
          echo "  ACTION_VAR_1=$ACTION_VAR_1"
          echo "  ACTION_VAR_2=$ACTION_VAR_2"
          echo "  ACTION_VAR_3=$ACTION_VAR_3"
          python read_github_vars.py
          if [ $? -ne 0 ]; then
            echo "ERROR: Python script failed!"
            exit 1
          fi
          echo "✓ Test passed successfully!"
      
      - name: Test reading action variables with Python
        env:
          MYGITHUB_TOKEN: ${{ secrets.MYGITHUB_TOKEN }}
          ACTION_VAR_1: ${{ steps.write_vars.outputs.action_var_1 }}
          ACTION_VAR_2: ${{ steps.write_vars.outputs.action_var_2 }}
          ACTION_VAR_3: ${{ steps.write_vars.outputs.action_var_3 }}
        run: |
          echo "Testing action variables read by Python..."
          python read_github_vars.py ACTION_VAR_1 ACTION_VAR_2 ACTION_VAR_3
          if [ $? -ne 0 ]; then
            echo "ERROR: Action variables test failed!"
            exit 1
          fi
          echo "✓ All action variables test passed!"
      
      - name: Display action variables written in previous step
        run: |
          echo "Action variables written by 'Write GitHub Action Variables' step:"
          echo "  action_var_1: ${{ steps.write_vars.outputs.action_var_1 }}"
          echo "  action_var_2: ${{ steps.write_vars.outputs.action_var_2 }}"
          echo "  action_var_3: ${{ steps.write_vars.outputs.action_var_3 }}"
